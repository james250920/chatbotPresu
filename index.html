<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chatbot Bloqueo Real</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

#chatButton{
    position:fixed;
    bottom:25px;
    right:25px;
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    z-index:99999;
    background:#cd202c;
    display:flex;
    align-items:center;
    justify-content:center;
}

#chatButton svg{
    width:28px;
    height:28px;
    fill:white;
}

#chatContainer{
    position:fixed;
    bottom:86px;
    right:25px;
    width:340px;
    height:520px;
    background:white;
    border-radius:22px;
    overflow:hidden;
    display:none;
    z-index:99998;
    border:1px solid rgba(0,0,0,.15);
    box-shadow:0 18px 50px rgba(0,0,0,.18);
}

#chatContainer.open{
    display:block;
}

#chatHeader{
    height:55px;
    background:#555759;
    color:white;
    display:flex;
    align-items:center;
    padding:0 20px;
    font-size:16px;
    font-weight:bold;
}

.iframe-wrapper{
    position:relative;
    width:100%;
    height:calc(100% - 55px);
    overflow:hidden;
    background:#fff;
}

/* IFRAME */
#chatFrame{
    position:absolute;
    top:-56px;
    left:0;
    width:100%;
    height:calc(100% + 56px);
    border:none;
    display:block;
    z-index:1;
}

/* DEBUG PANEL */
#debugCounterPanel{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.85);
    color:#fff;
    padding:10px;
    border-radius:8px;
    font-size:11px;
    line-height:1.4;
    z-index:200;
}

#debugCounterPanel span{
    color:#00ffcc;
    font-weight:bold;
}

/* SENSOR INVISIBLE */
#sensorClicks{
    position:absolute;
    bottom:0;
    right:0;
    width:40px;
    height:45px;
    z-index:9999;
    cursor:pointer;

    background:transparent;
    border:none;

    opacity:0;

    transition:opacity .2s ease;
}

/* DEBUG HOVER OPCIONAL */
#sensorClicks:hover{
    opacity:.08;
    background:#007bff;
}

/* OVERLAY */
#chatOverlay{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:45px;
    background:#cd202c;
    color:white;
    z-index:10000;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

#chatOverlay.active{
    display:flex;
}

/* MENSAJE LIMITE */
#mensajeLimite{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:30px;
    font-size:18px;
    font-weight:bold;
    color:#555;
    background:#fff;
    position:relative;
    z-index:2;
}

</style>
</head>

<body>

<button id="chatButton">

<svg viewBox="0 0 24 24">
<path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z"/>
</svg>

</button>

<div id="chatContainer">

<div id="chatHeader">
PresuBot
</div>

<div class="iframe-wrapper">

<div id="debugCounterPanel">

<div>Total: <span id="valTotal">0</span> / 10</div>

<div>Clicks: <span id="valClics">0</span></div>

</div>

<div id="sensorClicks"></div>

<div id="chatOverlay">
CHAT BLOQUEADO
</div>

<iframe
id="chatFrame"
src="https://copilotstudio.microsoft.com/environments/Default-f934e5f7-0088-4bee-a7de-b9ecc5f6941d/bots/cr622_agentTNS7FW/webchat?__version__=2&bg=ffffff">
</iframe>

</div>
</div>

<script>

const CHAT_URL = "https://copilotstudio.microsoft.com/environments/Default-f934e5f7-0088-4bee-a7de-b9ecc5f6941d/bots/cr622_agentTNS7FW/webchat?__version__=2&bg=ffffff";

const chatButton    = document.getElementById("chatButton");
const chatContainer = document.getElementById("chatContainer");
const chatOverlay   = document.getElementById("chatOverlay");
const sensorClicks  = document.getElementById("sensorClicks");

let chatFrame       = document.getElementById("chatFrame");

const valTotal      = document.getElementById("valTotal");
const valClics      = document.getElementById("valClics");

const LIMITE = 10;

let clicsContados = Number(localStorage.getItem("clicsContados")) || 0;

/* BORRAR STORAGE AL RECARGAR */
window.addEventListener("beforeunload", () => {

    localStorage.removeItem("clicsContados");

});

actualizarPanel();

function actualizarPanel(){

    valTotal.textContent = clicsContados;

    valClics.textContent = clicsContados;

}

function bloquearChat(){

    chatOverlay.classList.add("active");

    sensorClicks.style.display = "none";

    if(chatFrame){

        chatFrame.remove();

    }

    if(document.getElementById("mensajeLimite")) return;

    const mensaje = document.createElement("div");

    mensaje.id = "mensajeLimite";

    mensaje.innerHTML = "Has alcanzado al límite de mensajes por hoy";

    document.querySelector(".iframe-wrapper").appendChild(mensaje);

    console.log("CHAT BLOQUEADO");

}

function desbloquearChat(){

    clicsContados = 0;

    localStorage.removeItem("clicsContados");

    actualizarPanel();

    chatOverlay.classList.remove("active");

    sensorClicks.style.display = "block";

    const mensaje = document.getElementById("mensajeLimite");

    if(mensaje){

        mensaje.remove();

    }

    chatFrame = document.createElement("iframe");

    chatFrame.id = "chatFrame";

    chatFrame.src = CHAT_URL;

    document.querySelector(".iframe-wrapper").appendChild(chatFrame);

    console.log("CHAT DESBLOQUEADO");

}

function contarClick(){

    clicsContados++;

    localStorage.setItem("clicsContados", clicsContados);

    actualizarPanel();

    console.log("Clicks:", clicsContados);

    if(clicsContados >= LIMITE){

        bloquearChat();

    }

}

/* CLICK SENSOR */
sensorClicks.addEventListener("click", () => {

    if(clicsContados >= LIMITE) return;

    /* DESAPARECER TEMPORALMENTE */
    sensorClicks.style.pointerEvents = "none";

    sensorClicks.style.display = "none";

    /* CONTAR CLICK */
    contarClick();

    /* VOLVER EN 1.5 SEGUNDOS */
    setTimeout(() => {

        if(clicsContados < LIMITE){

            sensorClicks.style.display = "block";

            sensorClicks.style.pointerEvents = "auto";

        }

    }, 1500);

});

chatButton.addEventListener("click", () => {

    chatContainer.classList.toggle("open");

});

document.addEventListener("click", (e) => {

    if(!chatContainer.classList.contains("open")) return;

    if(
        !chatContainer.contains(e.target) &&
        e.target !== chatButton &&
        !chatButton.contains(e.target)
    ){

        chatContainer.classList.remove("open");

    }

});

actualizarPanel();

if(clicsContados >= LIMITE){

    bloquearChat();

}

</script>

</body>
</html>
