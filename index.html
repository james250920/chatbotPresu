<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chatbot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BOTÓN FLOTANTE */
#chatButton{
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    z-index: 99999;
    background: #cd202c;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: none;
    transition: all .3s ease;
}

/* NOTIFICACIÓN HOVER */
#chatTooltip{
    position: fixed;
    bottom: 94px;
    right: 25px;
    background: rgba(33, 37, 41, .96);
    color: #fff;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1;
    box-shadow: 0 10px 24px rgba(0,0,0,.2);
    opacity: 0;
    visibility: hidden;
    transform: translateY(6px) scale(.98);
    transition: opacity .2s ease, transform .2s ease, visibility .2s ease;
    z-index: 99999;
    pointer-events: none;
    white-space: nowrap;
}

#chatTooltip.show{
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
}

#chatButton:hover{
    transform: translateY(-2px) scale(1.06);
}

#chatButton:active{
    transform: scale(.98);
}

#chatButton svg{
    width: 28px;
    height: 28px;
    fill: white;
}

/* CONTENEDOR CHAT */
#chatContainer{
    position: fixed;
    bottom: 86px;
    right: 25px;
    width: 340px; 
    height: 520px;
    background: white;
    border: 1px solid rgba(0,0,0,.15);
    border-radius: 22px;
    overflow: hidden; 
    z-index: 99998;
    display: none;
    box-shadow: 0 18px 50px rgba(0,0,0,.18);
    animation: aparecer .25s ease;
}

#chatContainer.open{
    display:block;
}

/* TU NUEVA CABECERA GRIS #555759 */
#chatHeader{
    display: flex;
    align-items: center;
    background: #555759; /* <--- Color gris exacto aplicado con éxito */
    color: white;
    padding: 0 20px;
    font-size: 16px;
    font-weight: bold;
    height: 55px; 
    position: relative;
    z-index: 99999; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* CONTENEDOR DE RECORTE COMPLETO */
.iframe-wrapper {
    width: 100%;
    height: calc(100% - 55px); 
    overflow: hidden; 
    position: relative;
    background: #ffffff;
}

/* RECORTE DEL IFRAME */
#chatContainer iframe{
    width: 100%;
    height: calc(100% + 56px); 
    margin-top: -56px; 
    border: none;
    display: block;
}

/* RESPONSIVE */
@media(max-width: 480px){
    #chatContainer{
        width: calc(100% - 16px);
        height: min(70vh, 500px);
        right: 8px;
        bottom: 72px;
    }
}

/* ANIMACIÓN */
@keyframes aparecer{
    from{
        opacity:0;
        transform: translateY(20px) scale(.95);
    }
    to{
        opacity:1;
        transform: translateY(0) scale(1);
    }
}
</style>
</head>

<body>

<div id="chatTooltip">Chatbot Presupuesto</div>

<button id="chatButton">
    <svg viewBox="0 0 24 24">
        <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM7 9H17V11H7V9ZM13 14H7V12H13V14ZM17 8H7V6H17V8Z"/>
    </svg>
</button>

<div id="chatContainer">
    <div id="chatHeader">PresuBot</div>

    <div class="iframe-wrapper">
        <iframe
        src="https://copilotstudio.microsoft.com/environments/Default-f934e5f7-0088-4bee-a7de-b9ecc5f6941d/bots/cr622_agentTNS7FW/webchat?__version__=2&bg=ffffff"
        allow="microphone">
        </iframe>
    </div>
</div>

<script>
// LÓGICA DE APERTURA Y CIERRES
const chatButton = document.getElementById("chatButton");
const chatContainer = document.getElementById("chatContainer");
const chatTooltip = document.getElementById("chatTooltip");

chatButton.addEventListener("click", () => {
    chatContainer.classList.toggle("open");
});

chatButton.addEventListener("mouseenter", () => {
    chatTooltip.classList.add("show");
});

chatButton.addEventListener("mouseleave", () => {
    chatTooltip.classList.remove("show");
});

window.addEventListener("load", () => {
    chatTooltip.classList.add("show");
    setTimeout(() => {
        chatTooltip.classList.remove("show");
    }, 3000);
});

document.addEventListener('click', (e) => {
    if (!chatContainer.classList.contains('open')) return;
    const target = e.target;
    if (!chatContainer.contains(target) && target !== chatButton && !chatButton.contains(target)) {
        chatContainer.classList.remove('open');
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && chatContainer.classList.contains('open')) {
        chatContainer.classList.remove('open');
    }
});
</script>

</body>
</html>
